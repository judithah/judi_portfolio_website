<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data & Insights | Judith Hernandez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f5;
      --text: #1a1a1a;
      --text-muted: #5c5c5c;
      --accent: #ca1818;
      --border: #e8dfd4;
      --brown-dark: #3d2c1f;
      --brown-dark-light: #524030;
      --text-on-dark: #f2ebe3;
      --text-on-dark-muted: #d4c9bc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 1rem; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1rem 1.5rem;
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; }
    nav a { color: var(--text); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
    nav a:hover { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; }
    main { padding-top: 5rem; }
    .project-header { padding: 3rem 0 2rem; border-bottom: 1px solid var(--border); }
    .back-link { font-size: 0.9rem; color: var(--accent); text-decoration: none; margin-bottom: 1rem; display: inline-block; }
    .back-link:hover { text-decoration: underline; }
    .project-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 600; margin-bottom: 0.5rem; letter-spacing: 0.02em; }
    .project-header .subtitle { color: var(--text-muted); font-size: 1rem; }
    .project-content {
      padding: 3rem 0 4rem;
    }
    .project-content section { padding: 2rem 0; border-bottom: 1px solid var(--border); }
    .project-content section:last-child { border-bottom: none; }
    .project-content h2 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 500; margin-bottom: 1rem; color: var(--text); }
    .project-content p { color: var(--text-muted); margin-bottom: 1rem; }
    .project-content a { color: var(--accent); text-decoration: none; }
    .project-content a:hover { text-decoration: underline; }
    .dark-section { background: var(--brown-dark); color: var(--text-on-dark); padding: 3rem 0 !important; margin: 0 -1.5rem; padding-left: 1.5rem !important; padding-right: 1.5rem !important; }
    .dark-section h2 { color: var(--text-on-dark); }
    .dark-section p { color: var(--text-on-dark-muted); }
    .coming-soon {
      text-align: center;
      font-size: 1.25rem;
      color: var(--text-muted);
      padding: 3rem 0;
    }
    @media (max-width: 600px) { .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="index.html">Portfolio</a>
      <div class="nav-links">
        <a href="index.html#about">About</a>
        <a href="index.html#projects">Projects</a>
        <a href="index.html#skills">Skills</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <header class="project-header">
        <a href="index.html#projects" class="back-link">← Back to projects</a>
        <h1>Data & Insights</h1>
        <p class="subtitle">Data analyses using Pandas and SQL to extract, structure, and translate complex datasets into actionable insights.</p>
      </header>

      <div class="project-content">
        <p class="coming-soon">In progress, coming soon!</p>
      </div>
    </div>
  </main>
</body>
</html>
